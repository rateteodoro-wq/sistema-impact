<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SISTEMA IMPACT — Acesso Restrito</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #D4A017; --gold-bright: #F5C518; --dark: #0A0A0A;
      --card: #111111; --grid-line: rgba(212,160,23,0.08); --dim: #888888;
    }
    body {
      background: var(--dark); color: #E8E8E8; font-family: 'DM Sans', sans-serif;
      min-height: 100svh; display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      background-image: linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 36px 36px;
    }
    .glow {
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(212,160,23,.12), transparent 70%);
    }
    .box {
      position: relative; z-index: 1;
      background: var(--card); border: 1px solid rgba(212,160,23,.2);
      padding: 2.8rem 2.4rem; width: 100%; max-width: 420px; margin: 1rem;
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .box::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--gold-bright), transparent);
    }
    .badge {
      font-family: 'Share Tech Mono', monospace; font-size: .58rem;
      letter-spacing: .2em; color: var(--gold); border: 1px solid rgba(212,160,23,.35);
      padding: 3px 10px; display: inline-block; margin-bottom: 1.4rem;
      background: rgba(212,160,23,.06);
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif; font-size: 2.6rem;
      letter-spacing: .06em; line-height: 1; color: #E8E8E8; margin-bottom: .4rem;
    }
    h1 span { color: var(--gold-bright); }
    .sub {
      font-size: .82rem; color: var(--dim); line-height: 1.6; margin-bottom: 2rem;
    }
    label {
      font-family: 'Share Tech Mono', monospace; font-size: .62rem;
      letter-spacing: .18em; color: var(--gold); text-transform: uppercase;
      display: block; margin-bottom: .5rem;
    }
    .input-wrap { position: relative; margin-bottom: 1.4rem; }
    input[type="password"] {
      width: 100%; background: #0A0A0A; border: 1px solid rgba(212,160,23,.25);
      color: #E8E8E8; font-family: 'Share Tech Mono', monospace; font-size: .9rem;
      letter-spacing: .1em; padding: .85rem 1rem; outline: none;
      transition: border-color .2s;
    }
    input[type="password"]:focus { border-color: var(--gold); }
    input[type="password"]::placeholder { color: rgba(136,136,136,.4); letter-spacing: .05em; }
    .btn {
      width: 100%; padding: .95rem; background: var(--gold-bright); color: #0A0A0A;
      font-family: 'Share Tech Mono', monospace; font-size: .8rem; letter-spacing: .18em;
      text-transform: uppercase; font-weight: 700; border: none; cursor: pointer;
      transition: all .2s;
    }
    .btn:hover { background: #fff; box-shadow: 0 0 28px rgba(245,197,24,.35); }
    .btn:active { transform: scale(.98); }
    .error {
      font-family: 'Share Tech Mono', monospace; font-size: .65rem; letter-spacing: .12em;
      color: #e05050; margin-top: .9rem; display: none; text-align: center;
    }
    .error.show { display: block; }
    .footer-note {
      font-family: 'Share Tech Mono', monospace; font-size: .52rem;
      letter-spacing: .1em; color: rgba(136,136,136,.4); margin-top: 2rem;
      text-align: center; line-height: 1.6;
    }
  </style>
</head>
<body>
<div class="glow"></div>

<div class="box">
  <div class="badge">ACESSO RESTRITO // ASSINANTES</div>
  <h1>SISTEMA <span>IMPACT</span></h1>
  <p class="sub">Área exclusiva. Insira a senha de acesso para prosseguir.</p>

  <label for="senha">Senha de Acesso</label>
  <div class="input-wrap">
    <input type="password" id="senha" placeholder="••••••••••••" autocomplete="current-password" />
  </div>

  <button class="btn" onclick="autenticar()">VERIFICAR ACESSO →</button>
  <div class="error" id="erro">// ACESSO NEGADO — CREDENCIAL INVÁLIDA</div>

  <div class="footer-note">
    SISTEMA IMPACT // OPERAÇÃO EXCLUSIVA<br>
    INFRAESTRUTURA: VERCEL SECURE // STATUS: ONLINE
  </div>
</div>

<script>
  // =============================================
  // DEFINA A SENHA AQUI
  const SENHA_CORRETA = "impact2026";
  // =============================================

  // Se já está autenticado, redireciona direto
  if (sessionStorage.getItem('impact_auth') === 'true') {
    window.location.href = 'central-operacoes.html';
  }

  function autenticar() {
    const input = document.getElementById('senha').value;
    const erro = document.getElementById('erro');
    if (input === SENHA_CORRETA) {
      sessionStorage.setItem('impact_auth', 'true');
      window.location.href = 'central-operacoes.html';
    } else {
      erro.classList.add('show');
      document.getElementById('senha').value = '';
      document.getElementById('senha').focus();
    }
  }

  // Permite pressionar Enter para autenticar
  document.getElementById('senha').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') autenticar();
  });
</script>
</body>
</html>
