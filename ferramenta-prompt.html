<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SISTEMA IMPACT — Prompt Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #0A0A0A; }
    
    /* Nav */
    nav { position:fixed; inset:0 0 auto 0; z-index:200; height:52px; display:flex; align-items:center; justify-content:space-between;
      padding:0 1.1rem; background:rgba(10,10,10,0.96); border-bottom:1px solid rgba(212,160,23,0.18); }
    .nav-logo { font-family:'Bebas Neue',sans-serif; font-size:1.45rem; letter-spacing:.16em; color:#F5C518; text-decoration: none; }
    .nav-links { display:none; gap:1.5rem; }
    .nav-links a { font-family:'Share Tech Mono',monospace; font-size:.7rem; letter-spacing:.1em; text-transform:uppercase; color:#888888; text-decoration:none; transition:color .2s; }
    .nav-links a:hover { color:#F5C518; }
    .hamburger { display:flex; flex-direction:column; gap:5px; cursor:pointer; padding:6px; background:none; border:none; }
    .hamburger span { display:block; width:22px; height:2px; background:#D4A017; border-radius:2px; }
    .mobile-menu { display:none; position:fixed; top:52px; left:0; right:0; z-index:199; background:rgba(10,10,10,0.98);
      border-bottom:1px solid rgba(212,160,23,0.18); padding:1.25rem 1.1rem; flex-direction:column; gap:0; }
    .mobile-menu.open { display:flex; }
    .mobile-menu a { font-family:'Share Tech Mono',monospace; font-size:.85rem; letter-spacing:.12em; text-transform:uppercase;
      color:#888888; text-decoration:none; padding:.85rem 0; border-bottom:1px solid rgba(212,160,23,0.1); }
    .mobile-menu a:last-child { border-bottom:none; }
    @media(min-width:640px){ nav{padding:0 2rem;} .hamburger{display:none;} .nav-links{display:flex;} .mobile-menu{display:none!important;} }
    
    /* Iframe Container */
    .app-container {
      margin-top: 52px; /* Altura da navbar */
      width: 100%;
      height: calc(100vh - 52px);
      background: #0A0A0A;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

<nav>
  <a href="assinantes.html" class="nav-logo">SISTEMA IMPACT</a>
  <div class="nav-links">
    <a href="assinantes.html">← Retornar aos Módulos</a>
    <a href="#" onclick="logout()" style="color: #F5C518;">Desconectar</a>
  </div>
  <button class="hamburger" id="hbtn" aria-label="Menu"><span></span><span></span><span></span></button>
</nav>

<div class="mobile-menu" id="mmenu">
  <a href="assinantes.html">← Retornar aos Módulos</a>
  <a href="#" onclick="logout(); closeMenu()" style="color: #F5C518;">Desconectar</a>
</div>

<div class="app-container">
  <iframe src="https://impact-prompt-generator.vercel.app/" title="Impact Prompt Generator"></iframe>
</div>

<script>
  // Menu Mobile
  const hbtn = document.getElementById('hbtn');
  const mmenu = document.getElementById('mmenu');
  if(hbtn && mmenu) {
    hbtn.addEventListener('click', () => mmenu.classList.toggle('open'));
  }
  function closeMenu() { mmenu.classList.remove('open'); }

  // Função de Desconectar (Limpeza de Cache Basic Auth)
  function logout() {
    window.location.href = window.location.protocol + '//sair:sair@' + window.location.host + '/index.html';
  }
</script>
</body>
</html>
